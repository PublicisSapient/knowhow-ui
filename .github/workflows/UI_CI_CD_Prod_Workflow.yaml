name: UI_CI_CD_Prod_Workflow

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Git Tag for UI Production Release , Code Checkout from master"
        required: true
        type: string
        default: "17.1.0"
      deploy:
        description: "Deploy to Production"
        required: true
        type: boolean
        default: true

env:
  IMAGE_NAME: knowhow-ui
  ACR_NAME: ${{ secrets.SPEEDTOOLS_ACR_NAME }}
  ACR_LOGIN_SERVER: ${{ secrets.SPEEDTOOLS_ACR_LOGIN_SERVER }}
  BITBUCKET_HELM_REPO: ${{ secrets.SPEEDTOOLS_BITBUCKET_HELM_REPO }}

  # 🔥 Centralized Helm path
  HELM_CHART_PATH: build-configurations/KnowHOW-Deploy/knowhow-ui

  # 🔥 Centralized ArgoCD App
  ARGOCD_APP_NAME: knowhow-ui-prod

  GITHUB_HEAD_NAME: $GITHUB_REF_NAME

  # 🔐 Sonar
  sonartoken: ${{ secrets.SONARQUBE_TOKEN }}  # Secret for SonarQube authentication
  sonarurl: ${{ secrets.SONARURL }}  # SonarQube URL stored in secrets

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      argocd_app_name: ${{ env.ARGOCD_APP_NAME }}

    steps:
      - name: Set IMAGE_TAG & Prod Values File
        run: |
          TAG="${{ github.event.inputs.release_tag }}"
          echo "IMAGE_TAG=${TAG}" >> $GITHUB_ENV
          echo "VALUES_FILE=values-prod.yaml" >> $GITHUB_ENV

      - name: Checkout UI Repository from master
        uses: actions/checkout@v4

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # # Always run tests in PROD
      # - name: Code Format Check (Prettier)
      #   run: |
      #     npm install
      #     npx prettier "**/*.{ts,css}" --check

      - name: Install Dependencies & Build UI (Prod)
        run: |
          npm cache clean --force
          npm install
          npm install -g @angular/cli@17.3.12

          rm -rf dist/ build/
          npm run build:production

          mkdir -p build
          cp -r dist/dashboard/* build/

          chmod -R 775 build
          cd build
          tar -czvf ui2.tar *
          mv ui2.tar ../nginx/files

      # - name: Run UI Unit Tests (Always ON)
      #   run: |
      #     npm install --save-dev @angular-devkit/build-angular@17.3.12
      #     ng test --code-coverage --watch=false

      # - name: SonarQube Analysis  # Run static analysis
      #   run: |
      #     chown -R $(whoami) "$GITHUB_WORKSPACE"
      #     echo "sonar.branch.name=${{ env.GITHUB_HEAD_NAME }}" >> sonar-project.properties
      #     echo "sonar.host.url=${{ secrets.SONARQUBE_HOST }}" >> sonar-project.properties
      #     echo "sonar.login=${{ secrets.SONARQUBE_TOKEN }}" >> sonar-project.properties
      #     npm install -D sonarqube-scanner
      #     npm run sonar

      # - name: Check SonarQube Quality Gate
      #   run: |
      #     chmod +x SonarQG.sh
      #     ./SonarQG.sh ./.scannerwork/report-task.txt

      - name: Build & Push Docker Image to ACR
        run: |
          docker login $ACR_LOGIN_SERVER \
            --username ${{ secrets.SPEEDTOOLS_ACR_USERNAME }} \
            --password ${{ secrets.SPEEDTOOLS_ACR_PASSWORD }}

          docker build -t $ACR_LOGIN_SERVER/$IMAGE_NAME:$IMAGE_TAG .
          docker push $ACR_LOGIN_SERVER/$IMAGE_NAME:$IMAGE_TAG

          # Tag and push latest so the registry has a 'latest' pointer
          docker tag $ACR_LOGIN_SERVER/$IMAGE_NAME:$IMAGE_TAG $ACR_LOGIN_SERVER/$IMAGE_NAME:latest
          docker push $ACR_LOGIN_SERVER/$IMAGE_NAME:latest

      - name: Checkout Helm Charts (Bitbucket)
        if: ${{ github.event.inputs.deploy == 'true' }}
        run: |
          git clone $BITBUCKET_HELM_REPO
          cd $HELM_CHART_PATH

      #     yq -i ".image.tag = \"${IMAGE_TAG}\"" $VALUES_FILE

      #     git config user.name "github-actions"
      #     git config user.email "github-actions@github.com"
      #     git add $VALUES_FILE
      #     git diff --cached --quiet || git commit -m "Prod: Update image tag to ${IMAGE_TAG}"
      #     git push origin HEAD

  deploy:
    if: ${{ github.event.inputs.deploy == 'true' }}
    runs-on: github-actions-self-hosted-runner
    timeout-minutes: 30
    needs: build
    env:
      ARGOCD_APP_NAME: ${{ needs.build.outputs.argocd_app_name }}

    steps:
      - name: Install ArgoCD CLI
        run: |
          mkdir -p $HOME/bin
          curl -sSL -o "$HOME/bin/argocd" \
            https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x "$HOME/bin/argocd"
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: ArgoCD Login
        run: |
          argocd login argocd-server \
            --username ${{ secrets.SPEEDTOOLS_ARGOCD_USERNAME }} \
            --password ${{ secrets.SPEEDTOOLS_ARGOCD_PASSWORD }} \
            --plaintext

      - name: Sync App
        id: sync-app
        run: argocd app sync $ARGOCD_APP_NAME --force --prune
        continue-on-error: true

      - name: Restart app
        if: ${{ steps.sync-app.outcome == 'success' }}
        run: argocd app actions run $ARGOCD_APP_NAME restart

      - name: Get App URL (on sync failure)
        if: ${{ steps.sync-app.outcome != 'success' }}
        run: |
          app_url=$(argocd app get $ARGOCD_APP_NAME | grep 'URL:' | awk '{print $2}')
          echo "APP_URL=${app_url}" >> $GITHUB_ENV

      - name: Handle Sync Failure
        if: ${{ steps.sync-app.outcome != 'success' && env.APP_URL }}
        run: |
          echo "❌ Sync failed for '${ARGOCD_APP_NAME}'"
          echo "Check app: ${APP_URL}"
          exit 1

      - name: Wait For Health
        id: wait-app
        run: argocd app wait $ARGOCD_APP_NAME --health --timeout 600
        continue-on-error: true

      - name: Handle Health Timeout
        if: ${{ steps.wait-app.outcome != 'success' }}
        run: |
          app_url=$(argocd app get $ARGOCD_APP_NAME | grep 'URL:' | awk '{print $2}')
          echo "⚠️ App is not healthy. Check: $app_url"
          exit 1

      - name: Deployment Successful
        if: ${{ steps.sync-app.outcome == 'success' && steps.wait-app.outcome == 'success' }}
        run: echo "✅ UI Prod Deployment Successful!"
