<p-card styleClass="metric-card">
  <div class="card-header">
    <span class="card-title">{{ title }}</span>
    <i [class]="'pi ' + kpiIcon + ' icon-style'" [style]="'color:' + iconColor"></i>
  </div>

  @if(metricValue || metricUnit) {
    <div class="metric-value">
      <span class="value">{{ metricValue }}</span>
      <span class="unit">{{ metricUnit }}</span>
    </div>
  } @else {
    <div class="no-data"><strong>N/A</strong></div>
  }

  @if(absoluteTrendValue) {
    <div class="trend-container">
      <div [class]="'trend ' + (trendSeverity === 'success' ? 'positive' : 'negative')">
        <i [class]="'pi ' + trendIcon + ' trend-icon'"></i>
        <span class="trend-text">{{ absoluteTrendValue }}{{ trendUnit }} from last {{dateFilter}}</span>
      </div>
    </div>
  }
</p-card>
