<div class="ai-recommendation-card">
  <div class="card-content">
    <div class="header-section">
      <div class="ai-icon"></div>
      <span class="title">AI Recommended Target</span>
    </div>
    
    <div class="target-section">
      <span class="next-sprint">Next Sprint: </span>
      <span class="target-value">{{ targetValue }}</span>
      <span class="improvement">({{ improvement }} {{ improvementLabel }})</span>
    </div>
    
    <div class="action-section">
      <span class="action-link" (click)="onViewPlanClick()">Click to view AI intervention plan</span>
    </div>
  </div>
  
  <div class="chevron-icon">
    <svg width="8" height="14" viewBox="0 0 8 14" fill="none">
      <path d="M1 1L7 7L1 13" stroke="#4CAF50" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
</div>

<p-dialog [(visible)]="displayAiRecommModal" [modal]="true" [draggable]="true" [resizable]="true" 
  (onHide)="displayAiRecommModal=false" role="dialog" tabindex="0" 
  [style]="{'min-width': '35vw' , 'max-width': '40vw'}">
  <p-header>
    <div>
      <div>
        AI Intervention Plan
      </div>
      <div class="export-button">
        <span class="kpi-chip">{{kpiData.kpiDetail.kpiName}}</span>
      </div>
    </div>
  </p-header>

  <div class="dialog-body p-mb-4">
    <app-recomm-details 
      [infoBoxes]="aiRecommendationData.infoBoxes"
      [kpis]="aiRecommendationData.kpis" 
      [actionPlan]="aiRecommendationData.actionPlan"
      [kpiSectionTitle]="aiRecommendationData.kpiSectionTitle"
      [actionPlanTitle]="aiRecommendationData.actionPlanTitle"
      [showAiRationale]="true"
      [aiRationaleTitle]="'AI Analysis'"
      [aiRationaleDescription]="aiRecommendationData.aiRationaleDescription">
    </app-recomm-details>
  </div>
</p-dialog>
