<div class="card cursor-pointer" [ngStyle]="priorityStyle" (click)="handleProjectClickDialog()">
  <div class="header p-d-flex p-jc-between">
    <span class="priority-label" [ngStyle]="priorityLabelStyle">
      {{ priority }}
    </span>
    <span class="category">{{ category }}</span>
  </div>

  <h4 class="title">{{ title }}</h4>
  <p class="description">{{ description }}</p>
  <p class="savings">{{ savings }} potential savings</p>
</div>
